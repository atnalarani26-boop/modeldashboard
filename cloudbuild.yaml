# ============================================================
# Google Cloud Build — Build & Deploy to Cloud Run
# ============================================================
steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/sentiment-dashboard:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/sentiment-dashboard:latest'
      - '.'

  # Step 2: Push the image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/sentiment-dashboard:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/sentiment-dashboard:latest'

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'sentiment-dashboard'
      - '--image'
      - 'gcr.io/$PROJECT_ID/sentiment-dashboard:$COMMIT_SHA'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '1Gi'
      - '--cpu'
      - '1'
      - '--timeout'
      - '300'
      - '--port'
      - '8080'
      - '--set-env-vars'
      - 'GCS_BUCKET_NAME=${_GCS_BUCKET}'

substitutions:
  _REGION: us-central1
  _GCS_BUCKET: sentiment-model-store

images:
  - 'gcr.io/$PROJECT_ID/sentiment-dashboard:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/sentiment-dashboard:latest'

options:
  logging: CLOUD_LOGGING_ONLY
